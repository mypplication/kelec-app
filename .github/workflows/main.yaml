name: Main pipeline
run-name: ${{ github.event.commits[0].message }}

on:
  push:
    branches:
      - main
      - features/**
      - dependabot/**

  pull_request:
    branches:
      - main
      - KAN-**

jobs:
  code-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.JS
        uses: actions/setup-node@v4
        with:
          node-version: "22.4.1"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: ./node_modules/.bin/jest --coverage

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            reports/test-report.xml
            coverage/

  sonar-scan:
    runs-on: ubuntu-latest
    needs: code-validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-artifacts
          path: ./

      - name: Wake up Sonarqube
        uses: kelyanselme/kelyan_workflows_and_actions/.github/actions/wakeup-sonar@v1
        with:
          sonar_instance_url: ${{ secrets.SONAR_URL }}

      - name: SonarQube Scan
        continue-on-error: false
        uses: sonarsource/sonarqube-scan-action@master
        with:
          args: >
            -Dsonar.qualitygate.wait=true -Dsonar.projectKey=Kelec_Nextgen
            -Dsonar.projectName=Kelec_Nextgen
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_URL }}
